# Changelog configuration
[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
body = """
{% if version %}\n## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}\n{% else %}\n## [unreleased]\n{% endif %}\n{% for group, commits in commits | group_by(attribute="group") %}\n### {{ group | striptags | trim | upper_first }}\n{% for commit in commits %}\n- {{ commit.message | upper_first }}\n{% endfor %}\n{% endfor %}\n"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

[git.commit_parsers]
message = "^(\\w+)(?:\\(([^\\)]+)\\))?: (.+)$"
body = "^(.+)$"

[git.filter_commits]
conventional = true
